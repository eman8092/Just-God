name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWA Builder CLI
        run: npm install -g @bubblewrap/cli
        
      - name: Generate Android project from manifest
        run: |
          npx @bubblewrap/cli init --manifest https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
          
      - name: Build APK
        run: npx @bubblewrap/cli build
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-apk
          path: app-release-unsigned.apk
