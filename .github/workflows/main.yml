name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
        
      - name: Build APK
        run: |
          mkdir -p app
          cp -r * app/
          cd app
          npx @pwabuilder/cli build android --fallback --output ../output
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-apk
          path: output/*.apk
